<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sudoku — Randomthing.org</title>
<meta name="description" content="Play Sudoku — Easy 4×4, Medium 6×6, Hard 9×9, or a custom size. Fill every row, column, and box." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root { --ui:"Inter",system-ui,-apple-system,sans-serif; --ink:#1b1b20; --muted:#8a8a93; --line:#e8e8ec; --grid:#1b1b20; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; }
  body { font-family:var(--ui); color:var(--ink); background:#f6f6f8; min-height:100vh; -webkit-font-smoothing:antialiased;
    -webkit-user-select:none; user-select:none; }
  .nav { display:flex; align-items:center; gap:12px; padding:14px 20px; }
  .brand { font-family:"Baloo 2",sans-serif; font-weight:800; font-size:20px; letter-spacing:-.4px; color:var(--ink); text-decoration:none; padding:5px 8px; border-radius:10px; }
  .brand:hover { background:rgba(0,0,0,.05); }
  .brand .org { color:#ff5a5f; }
  .nav .sep { color:#cfcfd4; } .nav h1 { font-size:15px; font-weight:600; margin:0; color:#56565e; }

  .wrap { max-width:560px; margin:0 auto; padding:6px 18px 60px; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .modes { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
  .modes button { border:1px solid var(--line); background:#fff; color:var(--muted); cursor:pointer; font:600 13px var(--ui); padding:9px 15px; border-radius:999px; transition:all .14s; }
  .modes button:hover { color:var(--ink); }
  .modes button.on { background:#1b1b20; color:#fff; border-color:#1b1b20; }
  .custom { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center; font-size:13px; color:var(--muted); }
  .custom.hide { display:none; }
  .custom input { width:70px; border:1px solid var(--line); border-radius:10px; padding:8px 11px; font:600 14px var(--ui); text-align:center; }
  .custom .go { border:none; background:#1b1b20; color:#fff; border-radius:10px; padding:8px 16px; font:700 13px var(--ui); cursor:pointer; }
  .custom .go:disabled { background:#c8c8ce; cursor:default; }
  .custom .hint b { color:var(--ink); }
  .custom .hint.bad { color:#e5484d; }

  .status { font-size:14px; font-weight:600; color:var(--muted); min-height:1.2em; }

  .board { --bsz: min(92vw, 500px); display:grid; gap:0; background:var(--grid); border:3px solid var(--grid); border-radius:9px; overflow:hidden;
    width:var(--bsz); aspect-ratio:1/1; box-shadow:0 12px 30px rgba(0,0,0,.12); }
  .cell { background:#fff; border:1px solid #dcdce2; display:flex; align-items:center; justify-content:center;
    font-family:"Space Grotesk",var(--ui); font-weight:700; cursor:pointer; line-height:1;
    font-size:calc(var(--bsz) / var(--n) * 0.46); }
  .cell.given { color:var(--ink); font-weight:800; background:#eef0f4; cursor:default; }
  .cell:not(.given) { color:#2563eb; }
  .cell.peer { background:#eef2ff; }
  .cell.samev { background:#dbe6ff; }
  .cell.sel { background:#bcd4ff !important; box-shadow: inset 0 0 0 2px #2563eb; }
  .cell.bad { color:#e5484d !important; background:#fdecec !important; }
  .cell.br { border-right:2px solid var(--grid); }
  .cell.bb { border-bottom:2px solid var(--grid); }

  .pad { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:460px; }
  .pad button { min-width:40px; height:44px; border:1px solid var(--line); background:#fff; border-radius:11px; cursor:pointer;
    font-family:"Space Grotesk",var(--ui); font-weight:700; font-size:18px; color:var(--ink); padding:0 12px; transition:all .12s; }
  .pad button:hover { background:#f0f0f4; } .pad button:active { transform:translateY(1px); }
  .pad button.erase { color:#e5484d; font-size:14px; }

  .actions { display:flex; gap:10px; }
  .btn { font-family:"Baloo 2",sans-serif; font-weight:800; font-size:15px; border:none; border-radius:12px; padding:11px 22px; cursor:pointer; }
  .btn.primary { background:#1b1b20; color:#fff; } .btn.primary:hover { background:#000; }
  .btn.ghost { background:#fff; color:var(--ink); border:1px solid var(--line); } .btn.ghost:hover { background:#fafafa; }

  .win { position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; padding:24px;
    background:rgba(20,20,28,.55); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
  .win.hide { display:none; }
  .win-card { background:#fff; border-radius:20px; padding:30px 34px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.3); }
  .win-card h2 { font-family:"Baloo 2",sans-serif; font-size:34px; margin:0 0 6px; }
  .win-card p { color:var(--muted); margin:0 0 18px; font-size:14px; }

  /* hearts + status row */
  .hud { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .hearts { display:flex; align-items:center; gap:5px; min-height:26px; }
  .hearts svg { width:24px; height:24px; transition:transform .18s ease, color .18s ease; }
  .hearts .full { color:#e5484d; }
  .hearts .lost { color:#dcdce2; transform:scale(.82); }

  /* number pad: each key shows the digit with the remaining count below it */
  .pad button { min-width:44px; height:auto; padding:6px 12px 5px; display:flex; flex-direction:column; align-items:center; gap:1px; }
  .pad button .d { font-family:"Space Grotesk",var(--ui); font-weight:700; font-size:19px; line-height:1; }
  .pad button .cnt { font-size:10px; font-weight:600; color:var(--muted); line-height:1; }
  .pad button.done { opacity:.4; }
  .pad button.done .cnt { color:#c0c0c8; }
  .pad button.erase { justify-content:center; padding:0 16px; height:44px; color:#e5484d; font-size:14px; }

  /* pencil notes inside a cell */
  .cell { position:relative; }
  .cell .notes { position:absolute; inset:1px; display:grid; pointer-events:none; }
  .cell .notes span { display:flex; align-items:center; justify-content:center; line-height:1; color:#8a8a97;
    font-family:var(--ui); font-weight:600; font-size:calc(var(--bsz) / var(--n) * 0.2); }

  /* Notes toggle active state */
  #notesBtn.on { background:#2563eb; color:#fff; border-color:#2563eb; }

  /* hud top line: hearts + timer */
  .topline { display:flex; align-items:center; justify-content:center; gap:14px; }
  .timer { font-family:"Space Grotesk",var(--ui); font-weight:700; font-size:16px; color:var(--muted);
    font-variant-numeric:tabular-nums; min-width:44px; text-align:left; }

  .statsbtn { margin-top:2px; }

  /* My Stats popup */
  .stats-modal { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; padding:20px;
    background:rgba(20,20,28,.55); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
  .stats-modal.hide { display:none; }
  .stats-card { background:#fff; border-radius:20px; padding:22px 22px 24px; width:min(440px,100%); max-height:86vh; overflow-y:auto;
    box-shadow:0 20px 50px rgba(0,0,0,.3); }
  .stats-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .stats-head h2 { font-family:"Baloo 2",sans-serif; font-size:24px; margin:0; }
  .stats-x { border:none; background:rgba(0,0,0,.06); width:32px; height:32px; border-radius:9px; cursor:pointer; color:#6a6a72;
    display:flex; align-items:center; justify-content:center; padding:0; }
  .stats-x svg { width:16px; height:16px; }
  .stats-x:hover { background:rgba(0,0,0,.1); color:var(--ink); }
  .stats-tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
  .stats-tabs button { border:1px solid var(--line); background:#fff; color:var(--muted); cursor:pointer;
    font:600 12.5px var(--ui); padding:7px 12px; border-radius:999px; transition:all .12s; }
  .stats-tabs button:hover { color:var(--ink); }
  .stats-tabs button.on { background:#1b1b20; color:#fff; border-color:#1b1b20; }
  .stats-body { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat { background:#f4f4f7; border-radius:14px; padding:16px 8px; text-align:center; }
  .stat-n { font-family:"Space Grotesk",var(--ui); font-weight:700; font-size:25px; color:var(--ink);
    font-variant-numeric:tabular-nums; line-height:1; word-break:break-word; }
  .stat-l { margin-top:6px; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; }

  /* iPad / tablet portrait: give the board room to breathe (placed last so it wins) */
  @media (min-width: 768px) and (orientation: portrait) {
    .wrap { max-width: 720px; }
    .board { --bsz: min(84vw, 76vh, 640px); }
  }
</style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/">Randomthing<span class="org">.org</span></a>
    <span class="sep">/</span><h1>Sudoku</h1>
  </nav>

  <div class="wrap">
    <div class="modes" id="modes">
      <button data-n="4">Easy · 4×4</button>
      <button data-n="6">Medium · 6×6</button>
      <button data-n="9" class="on">Hard · 9×9</button>
      <button data-mode="custom">Custom</button>
    </div>
    <div class="custom hide" id="customRow">
      <input type="number" id="customN" min="4" max="16" placeholder="size" inputmode="numeric" />
      <span class="hint" id="customHint">Enter a size (4, 6, 8, 9, 10, 12, …)</span>
      <button class="go" id="customGo" disabled>Start</button>
    </div>

    <div class="hud">
      <div class="topline">
        <div class="hearts" id="hearts" aria-label="Lives"></div>
        <div class="timer" id="timer" aria-label="Time">0:00</div>
      </div>
      <div class="status" id="status"></div>
    </div>
    <div class="board" id="board"></div>
    <div class="pad" id="pad"></div>
    <div class="actions">
      <button class="btn primary" id="newBtn">New game</button>
      <button class="btn ghost" id="notesBtn" aria-pressed="false">Notes: Off</button>
      <button class="btn ghost" id="eraseBtn">Erase</button>
    </div>
    <button class="btn ghost statsbtn" id="statsBtn">My Stats</button>
  </div>

  <div class="win hide" id="win">
    <div class="win-card">
      <h2 id="winTitle">Solved!</h2>
      <p id="winSub"></p>
      <button class="btn primary" id="winAgain">New game</button>
    </div>
  </div>

  <div class="stats-modal hide" id="statsModal">
    <div class="stats-card">
      <div class="stats-head">
        <h2>My Stats</h2>
        <button class="stats-x" id="statsX" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="stats-tabs" id="statsTabs"></div>
      <div class="stats-body">
        <div class="stat"><div class="stat-n" id="stSuccess">0</div><div class="stat-l">Successes</div></div>
        <div class="stat"><div class="stat-n" id="stFail">0</div><div class="stat-l">Fails</div></div>
        <div class="stat"><div class="stat-n" id="stBest">—</div><div class="stat-l">Best Time</div></div>
      </div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const boardEl = $('board'), padEl = $('pad'), statusEl = $('status'), heartsEl = $('hearts');
  const MAX_LIVES = 3;

  let N = 9, P = 3, Q = 3;
  let grid = [], given = [], solved = [], notes = [], sel = null;
  let lives = MAX_LIVES, dead = false, notesMode = false;
  let startedAt = 0, finished = false, timerId = 0;

  // ---------- timer ----------
  function fmtTime(ms){
    const t = Math.floor(ms / 1000), h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
    const mm = h ? String(m).padStart(2, '0') : String(m);
    return (h ? h + ':' : '') + mm + ':' + String(s).padStart(2, '0');
  }
  function tickTimer(){ if (!finished) $('timer').textContent = fmtTime(performance.now() - startedAt); }
  function startTimer(){ startedAt = performance.now(); finished = false; clearInterval(timerId); timerId = setInterval(tickTimer, 250); tickTimer(); }
  function stopTimer(){ finished = true; clearInterval(timerId); }

  // ---------- stats (per size, persisted) ----------
  function loadStats(){ try { return JSON.parse(localStorage.getItem('sudoku_stats')) || {}; } catch (e) { return {}; } }
  function saveStats(s){ try { localStorage.setItem('sudoku_stats', JSON.stringify(s)); } catch (e) {} }
  function recordResult(n, won, ms){
    const s = loadStats(), k = String(n);
    if (!s[k]) s[k] = { success: 0, fail: 0, best: null };
    if (won){ s[k].success++; if (ms != null && (s[k].best == null || ms < s[k].best)) s[k].best = ms; }
    else s[k].fail++;
    saveStats(s);
  }
  function modeLabel(n){
    if (n === 4) return 'Easy · 4×4';
    if (n === 6) return 'Medium · 6×6';
    if (n === 9) return 'Hard · 9×9';
    return n + '×' + n;
  }

  // biggest near-square factor pair; null if none (prime or < 4) → not a valid Sudoku size
  function boxDims(n){ for (let p = Math.floor(Math.sqrt(n)); p >= 2; p--){ if (n % p === 0) return [p, n / p]; } return null; }
  const sym = v => v < 10 ? String(v) : String.fromCharCode(55 + v);   // 10→A … 16→G
  function shuffle(a){ for (let i = a.length - 1; i > 0; i--){ const j = (Math.random() * (i + 1)) | 0; [a[i], a[j]] = [a[j], a[i]]; } return a; }

  // count solutions of a puzzle, stopping at `limit` (used to keep puzzles unique)
  function countSolutions(puz, n, p, q, limit){
    const g = puz.map(r => r.slice());
    let count = 0;
    const ok = (r, c, v) => {
      for (let i = 0; i < n; i++) if (g[r][i] === v || g[i][c] === v) return false;
      const br = Math.floor(r / p) * p, bc = Math.floor(c / q) * q;
      for (let i = 0; i < p; i++) for (let j = 0; j < q; j++) if (g[br + i][bc + j] === v) return false;
      return true;
    };
    (function rec(){
      if (count >= limit) return;
      let er = -1, ec = -1;
      for (let r = 0; r < n && er < 0; r++) for (let c = 0; c < n; c++) if (!g[r][c]){ er = r; ec = c; break; }
      if (er < 0){ count++; return; }
      for (let v = 1; v <= n; v++){ if (ok(er, ec, v)){ g[er][ec] = v; rec(); g[er][ec] = 0; if (count >= limit) return; } }
    })();
    return count;
  }

  // how many clues to leave on the board — tuned so each size plays fair (with lives in mind)
  function cluesFor(n){
    if (n === 4) return 8;
    if (n === 6) return 18;
    if (n === 9) return 36;
    return Math.round(n * n * 0.45);
  }

  function makePuzzle(n){
    const [p, q] = boxDims(n);
    const g = Array.from({ length: n }, () => new Array(n).fill(0));
    const ok = (r, c, v) => {
      for (let i = 0; i < n; i++) if (g[r][i] === v || g[i][c] === v) return false;
      const br = Math.floor(r / p) * p, bc = Math.floor(c / q) * q;
      for (let i = 0; i < p; i++) for (let j = 0; j < q; j++) if (g[br + i][bc + j] === v) return false;
      return true;
    };
    (function fill(k){
      if (k === n * n) return true;
      const r = (k / n) | 0, c = k % n;
      for (const v of shuffle(Array.from({ length: n }, (_, i) => i + 1)))
        if (ok(r, c, v)){ g[r][c] = v; if (fill(k + 1)) return true; g[r][c] = 0; }
      return false;
    })(0);

    const full = g.map(row => row.slice());
    const puzzle = g.map(row => row.slice());
    const order = shuffle(Array.from({ length: n * n }, (_, i) => i));
    const target = cluesFor(n);
    const unique = n <= 12;         // uniqueness check is too slow for very large custom boards
    let clues = n * n;
    for (const idx of order){
      if (clues <= target) break;
      const r = (idx / n) | 0, c = idx % n;
      if (!puzzle[r][c]) continue;
      const saved = puzzle[r][c];
      puzzle[r][c] = 0;
      if (unique && countSolutions(puzzle, n, p, q, 2) !== 1){ puzzle[r][c] = saved; continue; }
      clues--;
    }
    return { puzzle, full, p, q };
  }

  function start(n){
    N = n; [P, Q] = boxDims(n);
    const res = makePuzzle(n);
    grid = res.puzzle.map(r => r.slice());
    solved = res.full;
    given = res.puzzle.map(r => r.map(v => v !== 0));
    notes = Array.from({ length: N }, () => Array.from({ length: N }, () => new Set()));
    sel = null; lives = MAX_LIVES; dead = false;
    setNotesMode(false);
    boardEl.style.setProperty('--n', N);
    boardEl.style.gridTemplateColumns = 'repeat(' + N + ', 1fr)';
    buildBoard(); buildPad(); buildHearts();
    statusEl.textContent = N + '×' + N + '  ·  ' + P + '×' + Q + ' boxes';
    $('win').classList.add('hide');
    startTimer();
    paint();
  }

  function buildBoard(){
    boardEl.innerHTML = '';
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++){
      const d = document.createElement('div');
      d.className = 'cell';
      if (c % Q === Q - 1 && c !== N - 1) d.classList.add('br');
      if (r % P === P - 1 && r !== N - 1) d.classList.add('bb');
      d.dataset.r = r; d.dataset.c = c;
      d.addEventListener('pointerdown', () => { if (dead) return; sel = { r, c }; paint(); });
      boardEl.appendChild(d);
    }
  }
  function buildPad(){
    padEl.innerHTML = '';
    for (let v = 1; v <= N; v++){
      const b = document.createElement('button');
      b.dataset.v = v;
      b.innerHTML = '<span class="d">' + sym(v) + '</span><span class="cnt"></span>';
      b.addEventListener('click', () => place(v));
      padEl.appendChild(b);
    }
    const e = document.createElement('button'); e.className = 'erase'; e.textContent = 'Erase';
    e.addEventListener('click', () => place(0)); padEl.appendChild(e);
  }
  function buildHearts(){
    const HEART = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
    heartsEl.innerHTML = '';
    for (let i = 0; i < MAX_LIVES; i++){
      const s = document.createElement('span');
      s.className = 'h ' + (i < lives ? 'full' : 'lost');
      s.innerHTML = HEART;
      heartsEl.appendChild(s);
    }
  }
  function updateHearts(){
    [...heartsEl.children].forEach((s, i) => { s.className = 'h ' + (i < lives ? 'full' : 'lost'); });
  }

  function conflicts(){
    const bad = new Set();
    const key = (r, c) => r + ',' + c;
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++){
      const v = grid[r][c]; if (!v) continue;
      for (let i = 0; i < N; i++){
        if (i !== c && grid[r][i] === v){ bad.add(key(r, c)); bad.add(key(r, i)); }
        if (i !== r && grid[i][c] === v){ bad.add(key(r, c)); bad.add(key(i, c)); }
      }
      const br = Math.floor(r / P) * P, bc = Math.floor(c / Q) * Q;
      for (let i = 0; i < P; i++) for (let j = 0; j < Q; j++){
        const rr = br + i, cc = bc + j;
        if ((rr !== r || cc !== c) && grid[rr][cc] === v){ bad.add(key(r, c)); bad.add(key(rr, cc)); }
      }
    }
    return bad;
  }

  function paint(){
    const bad = conflicts();
    const selV = sel ? grid[sel.r][sel.c] : 0;
    const cells = boardEl.children;
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++){
      const el = cells[r * N + c], v = grid[r][c];
      // wrong = filled, not a clue, and doesn't match the one true solution
      const wrong = v && !given[r][c] && v !== solved[r][c];
      if (v){
        el.innerHTML = '<span class="val">' + sym(v) + '</span>';
      } else if (notes[r][c].size){
        let html = '<div class="notes" style="grid-template-columns:repeat(' + Q + ',1fr)">';
        for (let k = 1; k <= N; k++) html += '<span>' + (notes[r][c].has(k) ? sym(k) : '') + '</span>';
        el.innerHTML = html + '</div>';
      } else {
        el.textContent = '';
      }
      el.classList.toggle('given', given[r][c]);
      el.classList.toggle('bad', wrong || bad.has(r + ',' + c));
      el.classList.remove('sel', 'peer', 'samev');
      if (sel){
        const inBox = Math.floor(r / P) === Math.floor(sel.r / P) && Math.floor(c / Q) === Math.floor(sel.c / Q);
        if (r === sel.r && c === sel.c) el.classList.add('sel');
        else if (r === sel.r || c === sel.c || inBox) el.classList.add('peer');
        if (v && v === selV && !(r === sel.r && c === sel.c)) el.classList.add('samev');
      }
    }
    // remaining count under each pad key: each digit appears N times in a full grid
    const used = new Array(N + 1).fill(0);
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) if (grid[r][c]) used[grid[r][c]]++;
    padEl.querySelectorAll('button[data-v]').forEach(b => {
      const v = +b.dataset.v, left = Math.max(0, N - used[v]);
      b.querySelector('.cnt').textContent = left;
      b.classList.toggle('done', left === 0);
    });
  }

  function clearPeerNotes(r, c, v){
    for (let i = 0; i < N; i++){ notes[r][i].delete(v); notes[i][c].delete(v); }
    const br = Math.floor(r / P) * P, bc = Math.floor(c / Q) * Q;
    for (let i = 0; i < P; i++) for (let j = 0; j < Q; j++) notes[br + i][bc + j].delete(v);
  }

  function place(v){
    if (dead || !sel) return;
    const { r, c } = sel;
    if (given[r][c]) return;

    // notes mode: toggle a pencil mark (never costs a life)
    if (notesMode && v > 0){
      if (grid[r][c]) return;                 // can't annotate a filled cell
      const s = notes[r][c];
      s.has(v) ? s.delete(v) : s.add(v);
      paint(); return;
    }

    if (v === 0){ grid[r][c] = 0; notes[r][c].clear(); paint(); return; }   // erase
    if (grid[r][c] === v){ grid[r][c] = 0; paint(); return; }               // tap same digit → clear

    grid[r][c] = v; notes[r][c].clear();
    if (v === solved[r][c]){
      clearPeerNotes(r, c, v);
    } else {
      lives--; updateHearts();
      if (lives <= 0){ dead = true; paint(); gameOver(); return; }
    }
    paint(); checkWin();
  }

  function checkWin(){
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) if (grid[r][c] !== solved[r][c]) return;
    const ms = performance.now() - startedAt;
    stopTimer();
    $('timer').textContent = fmtTime(ms); $('timer').dataset.ms = ms;
    recordResult(N, true, ms);
    const mistakes = MAX_LIVES - lives;
    $('winTitle').textContent = 'Solved!';
    $('winSub').textContent = 'You solved the ' + N + '×' + N + ' grid in ' + fmtTime(ms) +
      (mistakes ? ' with ' + mistakes + ' mistake' + (mistakes === 1 ? '' : 's') : ' with no mistakes') + '.';
    $('winAgain').textContent = 'New game';
    $('win').classList.remove('hide');
  }
  function gameOver(){
    stopTimer();
    recordResult(N, false, null);
    $('winTitle').textContent = 'Out of hearts';
    $('winSub').textContent = 'Three mistakes — the board resets. Give it another go.';
    $('winAgain').textContent = 'Restart';
    $('win').classList.remove('hide');
  }

  function setNotesMode(on){
    notesMode = on;
    const b = $('notesBtn');
    b.classList.toggle('on', on);
    b.textContent = 'Notes: ' + (on ? 'On' : 'Off');
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  }

  // keyboard
  addEventListener('keydown', e => {
    if (e.key === 'n' || e.key === 'N'){ setNotesMode(!notesMode); e.preventDefault(); return; }
    if (!sel || dead) return;
    if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0'){ place(0); e.preventDefault(); return; }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
      if (e.key === 'ArrowUp') sel.r = (sel.r + N - 1) % N;
      if (e.key === 'ArrowDown') sel.r = (sel.r + 1) % N;
      if (e.key === 'ArrowLeft') sel.c = (sel.c + N - 1) % N;
      if (e.key === 'ArrowRight') sel.c = (sel.c + 1) % N;
      paint(); e.preventDefault(); return;
    }
    let v = 0;
    if (/^[1-9]$/.test(e.key)) v = +e.key;
    else if (/^[a-gA-G]$/.test(e.key)) v = e.key.toUpperCase().charCodeAt(0) - 55;
    if (v >= 1 && v <= N) place(v);
  });

  // controls
  $('modes').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    if (b.dataset.mode === 'custom'){
      $('modes').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
      $('customRow').classList.remove('hide'); $('customN').focus();
      return;
    }
    $('customRow').classList.add('hide');
    $('modes').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
    start(+b.dataset.n);
  }));

  function validateCustom(){
    const n = parseInt($('customN').value, 10);
    const hint = $('customHint'), go = $('customGo');
    if (!n || n < 4){ hint.textContent = 'Too small — 4 is the minimum'; hint.classList.add('bad'); go.disabled = true; return; }
    if (n > 16){ hint.textContent = 'Keep it 16 or under'; hint.classList.add('bad'); go.disabled = true; return; }
    const d = boxDims(n);
    if (!d){ hint.textContent = n + '×' + n + " can't be split into boxes — pick 4, 6, 8, 9, 10, 12, 14, 15, 16"; hint.classList.add('bad'); go.disabled = true; return; }
    hint.innerHTML = '<b>' + n + '×' + n + '</b> · ' + d[0] + '×' + d[1] + ' boxes'; hint.classList.remove('bad'); go.disabled = false;
  }
  $('customN').addEventListener('input', validateCustom);
  $('customGo').addEventListener('click', () => { const n = parseInt($('customN').value, 10); if (boxDims(n) && n >= 4 && n <= 16) start(n); });
  $('newBtn').addEventListener('click', () => start(N));
  $('notesBtn').addEventListener('click', () => setNotesMode(!notesMode));
  $('eraseBtn').addEventListener('click', () => place(0));
  $('winAgain').addEventListener('click', () => start(N));

  // ---------- My Stats popup ----------
  let statsTab = 'all';
  function renderStatsBody(){
    const s = loadStats();
    let st;
    if (statsTab === 'all'){
      st = { success: 0, fail: 0, best: null };
      for (const k in s){ st.success += s[k].success; st.fail += s[k].fail;
        if (s[k].best != null && (st.best == null || s[k].best < st.best)) st.best = s[k].best; }
    } else {
      st = s[statsTab] || { success: 0, fail: 0, best: null };
    }
    $('stSuccess').textContent = st.success;
    $('stFail').textContent = st.fail;
    $('stBest').textContent = st.best != null ? fmtTime(st.best) : '—';
  }
  function buildStatsTabs(){
    const s = loadStats();
    const sizes = new Set([4, 6, 9]);
    Object.keys(s).forEach(k => sizes.add(+k));
    const tabs = [{ id: 'all', label: 'All Modes' }].concat(
      [...sizes].sort((a, b) => a - b).map(n => ({ id: String(n), label: modeLabel(n) })));
    if (!tabs.some(t => t.id === statsTab)) statsTab = 'all';
    const wrap = $('statsTabs'); wrap.innerHTML = '';
    tabs.forEach(t => {
      const b = document.createElement('button');
      b.textContent = t.label; b.classList.toggle('on', t.id === statsTab);
      b.addEventListener('click', () => { statsTab = t.id; buildStatsTabs(); renderStatsBody(); });
      wrap.appendChild(b);
    });
  }
  function openStats(){ buildStatsTabs(); renderStatsBody(); $('statsModal').classList.remove('hide'); }
  function closeStats(){ $('statsModal').classList.add('hide'); }
  $('statsBtn').addEventListener('click', openStats);
  $('statsX').addEventListener('click', closeStats);
  $('statsModal').addEventListener('click', e => { if (e.target === $('statsModal')) closeStats(); });

  start(9);
</script>
  <script defer src="/cookie-consent.js"></script>
  <script defer src="/now-playing.js"></script>
</body>
