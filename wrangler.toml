# Cloudflare Pages config. IMPORTANT: set `name` to your actual Pages project
# name (Cloudflare dashboard → Workers & Pages → your project). It must match,
# or the Git build will fail.
name = "randomthing"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

# One global Durable Object counts the live WebSocket connections (online devices).
[[durable_objects.bindings]]
name = "ONLINE"
class_name = "OnlineCounter"

# Free plan requires SQLite-backed Durable Objects.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["OnlineCounter"]
