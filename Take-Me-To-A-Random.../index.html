<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Take me to a random… — Randomthing.org</title>
<meta name="description" content="Jump to a random website, YouTube video, or Instagram post." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#1d1d1f; --muted:#8a8a8e; --line:#e8e8ec; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; }
  body { font-family:"Inter",system-ui,-apple-system,sans-serif; color:var(--ink); background:#fff; min-height:100vh; -webkit-font-smoothing:antialiased; }

  .nav { display:flex; align-items:center; gap:12px; padding:16px 22px; }
  .brand { font-family:"Baloo 2",sans-serif; font-weight:800; font-size:20px; letter-spacing:-.4px; color:var(--ink); text-decoration:none; padding:5px 8px; border-radius:10px; }
  .brand:hover { background:rgba(0,0,0,.05); }
  .brand .org { color:#ff5a5f; }
  .nav .sep { color:#cfcfd4; } .nav h1 { font-size:15px; font-weight:600; margin:0; color:#56565e; }

  main { max-width:780px; margin:0 auto; padding:26px 22px 80px; }
  .title { font-family:"Baloo 2",sans-serif; font-weight:800; font-size:clamp(30px,6vw,52px); line-height:1.05; text-align:center; margin:18px 0 8px; }
  .sub { text-align:center; color:var(--muted); font-size:15px; font-weight:500; margin-bottom:34px; }

  .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; }
  @media (max-width:640px){ .grid { grid-template-columns:repeat(2, 1fr); gap:16px; } }
  .item { cursor:pointer; text-decoration:none; color:inherit; display:flex; flex-direction:column; align-items:center; gap:11px;
    background:none; border:none; padding:6px; border-radius:18px; transition:transform .14s ease; font:inherit; }
  .item:hover { transform:translateY(-4px); }
  .tile { width:100%; aspect-ratio:1/1; border-radius:24px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 26px rgba(0,0,0,.16); position:relative; overflow:hidden; }
  .tile svg { width:46%; height:46%; color:#fff; position:relative; z-index:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
  .item .name { font-weight:700; font-size:14px; text-align:center; line-height:1.25; }
  .item .arrow { opacity:0; transition:opacity .14s; color:var(--muted); font-size:12px; font-weight:700; }
  .item:hover .arrow { opacity:1; }

  .web  { background:radial-gradient(120% 120% at 30% 20%, #38bdf8, #2563eb); }
  .yt   { background:radial-gradient(120% 120% at 30% 20%, #ff5b5b, #d61f26); }
  .ig   { background:linear-gradient(135deg, #f9ce34 0%, #ee2a7b 48%, #6228d7 100%); }
  .img  { background:radial-gradient(120% 120% at 30% 20%, #34d399, #0d9488); }
  .reddit { background:radial-gradient(120% 120% at 30% 20%, #ff7a45, #ff4500); }
  .wiki { background:radial-gradient(120% 120% at 30% 20%, #94a3b8, #334155); }
  .street { background:radial-gradient(120% 120% at 30% 20%, #4ade80, #15803d); }
  .cat  { background:radial-gradient(120% 120% at 30% 20%, #fb7185, #e11d48); }

  footer { text-align:center; color:var(--muted); font-size:12.5px; padding:24px; }
</style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/">Randomthing<span class="org">.org</span></a>
    <span class="sep">/</span><h1>Random</h1>
  </nav>

  <main>
    <div class="title">Take me to a random…</div>
    <div class="sub">Pick one and get whisked off to something new in a fresh tab.</div>

    <div class="grid" id="grid">
      <button class="item" data-kind="web">
        <div class="tile web"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.6 2.7 2.6 15.3 0 18M12 3c-2.6 2.7-2.6 15.3 0 18"/></svg></div>
        <span class="name">Random Website</span>
        <span class="arrow">open ↗</span>
      </button>
      <button class="item" data-kind="yt">
        <div class="tile yt"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 12c0-2.4-.2-4-.5-4.9-.3-.9-1-1.6-1.9-1.8C18.9 5 12 5 12 5s-6.9 0-8.6.3c-.9.2-1.6.9-1.9 1.8C1.2 8 1 9.6 1 12s.2 4 .5 4.9c.3.9 1 1.6 1.9 1.8C5.1 19 12 19 12 19s6.9 0 8.6-.3c.9-.2 1.6-.9 1.9-1.8.3-.9.5-2.5.5-4.9zM10 15V9l5 3z"/></svg></div>
        <span class="name">Random YouTube Video</span>
        <span class="arrow">open ↗</span>
      </button>
      <button class="item" data-kind="ig">
        <div class="tile ig"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg></div>
        <span class="name">Random Instagram Account</span>
        <span class="arrow">open ↗</span>
      </button>
      <button class="item" data-kind="img">
        <div class="tile img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg></div>
        <span class="name">Random Image</span>
        <span class="arrow">open ↗</span>
      </button>
      <button class="item" data-kind="reddit">
        <div class="tile reddit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13.5" r="7.5"/><circle cx="9" cy="13" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="13" r="1" fill="currentColor" stroke="none"/><path d="M9.2 16.5c1.6 1.1 4 1.1 5.6 0"/><circle cx="18.5" cy="6.5" r="1.6"/><path d="M12 6l1.2-3 4 1"/></svg></div>
        <span class="name">Random Subreddit</span>
        <span class="arrow">open ↗</span>
      </button>
      <button class="item" data-kind="wiki">
        <div class="tile wiki"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h6v16H6a2 2 0 00-2 2V5z"/><path d="M20 5a2 2 0 00-2-2h-6v16h6a2 2 0 012 2V5z"/></svg></div>
        <span class="name">Random Wikipedia Article</span>
        <span class="arrow">open ↗</span>
      </button>
      <button class="item" data-kind="street">
        <div class="tile street"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 1114 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.6"/></svg></div>
        <span class="name">Random Street View</span>
        <span class="arrow">open ↗</span>
      </button>
      <button class="item" data-kind="cat">
        <div class="tile cat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 4.5l3.2 4M19.5 4.5l-3.2 4"/><path d="M5 9.5C5 8 6.5 7.5 12 7.5s7 .5 7 2c1 4.5-2.2 11-7 11s-8-6.5-7-11z"/><path d="M9.5 12.5h.01M14.5 12.5h.01"/><path d="M12 14.5v1.2M9.6 16.4h4.8"/></svg></div>
        <span class="name">Random Cat</span>
        <span class="arrow">open ↗</span>
      </button>
    </div>
  </main>

  <footer>More random jumps coming soon.</footer>

<script>
  // Website: real random client-side. YouTube/Instagram: the worker searches a
  // random keyword and returns one of the top results; falls back to a curated
  // list if the worker isn't deployed.
  // Wikipedia's random article is repeated a few times so a big share of clicks
  // land on a genuinely different page each time; the rest are fun corners of the web.
  const WEB = [
    'https://en.wikipedia.org/wiki/Special:Random', 'https://en.wikipedia.org/wiki/Special:Random',
    'https://en.wikipedia.org/wiki/Special:Random', 'https://en.wikipedia.org/wiki/Special:Random',
    'https://neal.fun', 'https://pointerpointer.com', 'https://window-swap.com', 'https://radio.garden',
    'https://mapcrunch.com', 'https://theuselessweb.com/', 'https://cat-bounce.com/', 'https://thisissand.com/',
    'https://koalastothemax.com/', 'https://eelslap.com/', 'https://thatsthefinger.com/', 'https://papertoilet.com/',
    'https://hackertyper.net/', 'https://drawing.garden/', 'https://puginarug.com/', 'https://corndog.io/',
    'https://procatinator.com/', 'https://rainymood.com/', 'https://www.incredibox.com/', 'https://www.shadertoy.com/',
    'https://www.sporcle.com/', 'https://www.geoguessr.com/', 'https://quickdraw.withgoogle.com/',
    'https://experiments.withgoogle.com/', 'https://artsandculture.google.com/', 'https://patatap.com/',
    'https://weavesilk.com/', 'https://www.jacksonpollock.org/', 'https://everynoise.com/', 'https://ncase.me/',
    'https://explorabl.es/', 'https://stellarium-web.org/', 'https://htwins.net/scale2/', 'https://www.windy.com/',
    'https://www.flightradar24.com/', 'https://www.marinetraffic.com/', 'https://zombo.com/',
    'https://findtheinvisiblecow.com/', 'https://staggeringbeauty.com/', 'https://longdogechallenge.com/',
    'https://thispersondoesnotexist.com/', 'https://www.boredbutton.com/', 'https://dwitter.net/',
    'https://littlealchemy2.com/', 'https://sandspiel.club/', 'https://orb.farm/',
    'https://musiclab.chromeexperiments.com/', 'https://earth.google.com/web/', 'https://www.openculture.com/',
    'https://archive.org/', 'https://www.gutenberg.org/', 'https://unsplash.com/', 'https://coolors.co/',
    'https://neal.fun/deep-sea/', 'https://neal.fun/size-of-space/', 'https://neal.fun/space-elevator/',
    'https://www.pinball.org/', 'https://tholman.com/', 'https://css-tricks.com/', 'https://a.singlediv.com/',
    'https://neal.fun/password-game/', 'https://neal.fun/internet-artifacts/', 'https://neal.fun/wonders-of-street-view/',
    'https://neal.fun/life-stats/', 'https://neal.fun/spend/', 'https://neal.fun/wire/', 'https://www.atlasobscura.com/',
    'https://pudding.cool/', 'https://radiooooo.com/', 'https://waitbutwhy.com/', 'https://kottke.org/',
    'https://www.mentalfloss.com/', 'https://www.ted.com/', 'https://informationisbeautiful.net/',
    'https://observablehq.com/', 'https://www.autodraw.com/', 'https://zoom.earth/', 'https://www.ventusky.com/',
    'https://www.openstreetmap.org/', 'https://www.solarsystemscope.com/', 'https://stuffin.space/',
    'https://www.noisli.com/', 'https://asoftmurmur.com/', 'https://endless.horse/', 'https://fakeupdate.net/',
    'https://heeeeeeeey.com/', 'https://typatone.com/', 'https://clickclickclick.click/',
    'https://apod.nasa.gov/apod/astropix.html', 'https://eyes.nasa.gov/', 'https://thiscatdoesnotexist.com/',
    'https://thisartworkdoesnotexist.com/', 'https://www.whichfaceisreal.com/', 'https://excalidraw.com/',
    'https://www.tldraw.com/', 'https://www.photopea.com/', 'https://squoosh.app/', 'https://play2048.co/',
    'https://lichess.org/', 'https://www.chess.com/', 'https://www.quantamagazine.org/', 'https://nautil.us/',
    'https://aeon.co/', 'https://longreads.com/', 'https://www.submarinecablemap.com/', 'https://opentopomap.org/',
    'https://musicforprogramming.net/', 'https://fonts.google.com/', 'https://coolors.co/generate',
    'https://www.pexels.com/', 'https://giphy.com/', 'https://tenor.com/', 'https://www.behance.net/',
    'https://dribbble.com/', 'https://codepen.io/', 'https://www.are.na/', 'https://scale.chromeexperiments.com/',
    'https://www.mozilla.org/en-US/firefox/', 'https://archillect.com/', 'https://weirdorconfusing.com/',
    'https://www.calm.com/', 'https://ismycomputeron.com/', 'https://cat-bounce.com/'
  ];
  const FALLBACK_YT = ['https://www.youtube.com/watch?v=jNQXAC9IVRw', 'https://www.youtube.com/watch?v=jfKfPfyJRdk', 'https://www.youtube.com/watch?v=5qap5aO4i9A'];
  // ~300 big public Instagram accounts (celebs, athletes, brands, creators, orgs)
  const IG = ['instagram','cristiano','leomessi','kyliejenner','selenagomez','therock','arianagrande','kimkardashian','beyonce','khloekardashian','kendalljenner','natgeo','nike','justinbieber','taylorswift','virat.kohli','nickiminaj','jlo','kourtneykardash','mileycyrus','katyperry','zendaya','kevinhart4real','ddlovato','theellenshow','badgalriri','gigihadid','nasa','shakira','davidbeckham','championsleague','vindiesel','chrisbrownofficial','champagnepapi','snoopdogg','realmadrid','fcbarcelona','emmawatson','priyankachopra','deepikapadukone','neymarjr','nba','kingjames','billieeilish','dualipa','teddysphotos','shawnmendes','camila_cabello','postmalone','travisscott','theweeknd','adele','ladygaga','brunomars','jbalvin','maluma','karolg','sanbenito','anitta','daddyyankee','ozuna','iamcardib','theestallion','sza','dojacat','oliviarodrigo','harrystyles','zayn','niallhoran','liampayne','iamhalsey','marshmello','davidguetta','calvinharris','tiesto','martingarrix','krisjenner','gwenstefani','justintimberlake','pink','onedirection','coldplay','imaginedragons','maroon5','linkinpark','metallica','wizkhalifa','21savage','lildurk','offsetyrn','quavo','g_eazy','frenchmontana','french','2chainz','vancityreynolds','tomholland2013','robertdowneyjr','chrishemsworth','markruffalo','gal_gadot','willsmith','jadapinkettsmith','milliebobbybrown','finnwolfhardofficial','leonardodicaprio','officiallymcconaughey','thehughjackman','chrisevans','elizabetholsenofficial','sebastianstan','anthonymackie','idriselba','samuelljackson','aliaabhatt','katrinakaif','anushkasharma','ranveersingh','akshaykumar','tigerjackieshroff','shraddhakapoor','kareenakapoorkhan','madhuridixitnene','varundvn','sidmalhotra','kritisanon','jacquelinef143','sonamkapoor','dishapatani','kobebryant','stephencurry30','kevindurant','russwest44','jamesharden13','giannis_an34','kyrieirving','damianlillard','usainbolt','serenawilliams','rogerfederer','rafaelnadal','tigerwoods','floydmayweather','thenotoriousmma','khabib_nurmagome   // popular safe subreddits — Reddit killed per-post /random on the new site,
  // so we open a random subreddit's top posts of the week instead.
  const SUBS = ['todayilearned','damnthatsinteresting','interestingasfuck','mildlyinteresting','science','space','earthporn','food','gaming','movies','books','history','art','nature','videos','showerthoughts','askreddit','explainlikeimfive','dataisbeautiful','mapporn','oddlysatisfying','natureisfuckinglit','getmotivated','itookapicture','museum','coolguides','educationalgifs','nextfuckinglevel','beamazed','humansbeingbros','aww','foodporn','cozyplaces','architecture','design','crafts','woodworking','gardening','hiking','camping','travel','geography','astronomy','physics','biology','technology','futurology','documentaries','todayifoundout','lifeprotips','youshouldknow','pics','funny','wholesomememes'];
  const rand = a => a[(Math.random() * a.length) | 0];

  async function pickUrl(kind){
    if (kind === 'web') return rand(WEB);
    if (kind === 'ig') return 'https://www.instagram.com/' + rand(IG) + '/';
    if (kind === 'img') return 'https://picsum.photos/seed/' + Math.random().toString(36).slice(2) + '/1600/900';
    if (kind === 'reddit') return 'https://www.reddit.com/r/' + rand(SUBS) + '/top/?t=week';
    if (kind === 'wiki') return 'https://en.wikipedia.org/wiki/Special:Random';
    if (kind === 'street') return 'https://randomstreetview.com/';
    if (kind === 'cat') return 'https://cataas.com/cat?rand=' + Math.random().toString(36).slice(2);
    // youtube: the worker searches a random keyword and returns a top result
    try {
      const r = await fetch('/api/random/youtube', { cache: 'no-store' });
      if (r.ok){ const j = await r.json(); if (j && j.url) return j.url; }
    } catch(e){}
    return rand(FALLBACK_YT);
  }
  document.querySelectorAll('.item').forEach(b => b.addEventListener('click', () => {
    const win = window.open('', '_blank');           // reserve the tab inside the click gesture
    pickUrl(b.dataset.kind).then(url => {
      if (win) win.location.href = url; else window.open(url, '_blank', 'noopener');
    }).catch(() => { if (win) win.close(); });
  }));
</script>
  <script defer src="/cookie-consent.js"></script>
