<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Background — Randomthing.org</title>
<meta name="description" content="Five interactive shader wallpapers that react to your mouse and clicks." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ui: "Inter", system-ui, -apple-system, sans-serif;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#05060a; }
  body { font-family: var(--ui); -webkit-font-smoothing: antialiased; }

  #gl { position:fixed; inset:0; width:100vw; height:100vh; display:block; touch-action:none; }

  /* ----- floating UI ----- */
  .ui { position:fixed; inset:0; pointer-events:none; z-index:5;
    transition: opacity .5s ease; }
  .ui.idle { opacity:.18; }

  /* top-left frosted brand pill */
  .topbar { position:absolute; top:18px; left:18px; display:flex; align-items:center; gap:11px;
    pointer-events:auto; }
  .glass {
    background: rgba(10,12,20,.42);
    backdrop-filter: blur(14px) saturate(150%);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  .brand {
    font-family: "Baloo 2", sans-serif; font-weight: 800; font-size: 19px;
    letter-spacing: -.4px; line-height: 1; color: #fff; text-decoration: none;
    padding: 9px 14px; display:inline-flex; align-items:center; gap:9px;
  }
  .brand .org { color: #ff6b70; }
  .brand .sep { color: rgba(255,255,255,.30); font-weight:600; font-family:var(--ui); }
  .brand .page { color: rgba(255,255,255,.72); font-family:var(--ui); font-weight:600; font-size:14px; }
  .brand:hover { background: rgba(255,255,255,.06); border-radius:14px; }

  /* caption (current wallpaper) */
  .caption { position:absolute; left:20px; bottom:96px; pointer-events:none;
    color:#fff; max-width: 320px; }
  .caption .nm { font-family:"Baloo 2",sans-serif; font-weight:800; font-size:30px; letter-spacing:-.5px;
    text-shadow:0 2px 18px rgba(0,0,0,.5); }
  .caption .hint { margin-top:6px; font-size:13px; font-weight:500; color:rgba(255,255,255,.7);
    text-shadow:0 1px 10px rgba(0,0,0,.6); }

  /* bottom dock */
  .dock { position:absolute; left:50%; bottom:22px; transform:translateX(-50%);
    display:flex; flex-wrap:wrap; justify-content:center; max-width:94vw;
    gap:6px; padding:6px; pointer-events:auto; }
  .dock button {
    border:none; background:transparent; cursor:pointer; color:rgba(255,255,255,.7);
    font-family:var(--ui); font-size:13px; font-weight:600; letter-spacing:-.01em;
    padding:9px 15px; border-radius:10px; transition: all .16s ease; white-space:nowrap;
  }
  .dock button:hover { color:#fff; background:rgba(255,255,255,.08); }
  .dock button.on { color:#fff; background:rgba(255,255,255,.16);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.18); }

  .nojs { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    color:#fff; font-size:15px; text-align:center; padding:24px; }

  @media (max-width:560px){
    .caption .nm { font-size:24px; }
    .caption { bottom:84px; }
    .dock button { padding:8px 11px; font-size:12px; }
  }
</style>
</head>
<body>
  <canvas id="gl"></canvas>

  <div class="ui" id="ui">
    <div class="topbar">
      <a class="brand glass" href="/">Randomthing<span class="org">.org</span><span class="sep">/</span><span class="page">Background</span></a>
    </div>

    <div class="caption">
      <div class="nm" id="capName">Nebula</div>
      <div class="hint">Move your mouse to warm the gas · click to ignite it</div>
    </div>

    <div class="dock glass" id="dock"></div>
  </div>

  <div class="nojs" id="nojs">Your browser doesn’t support WebGL, so these wallpapers can’t run.</div>

<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { document.getElementById('nojs').style.display='flex'; }

const VERT = `attribute vec2 a; void main(){ gl_Position = vec4(a,0.0,1.0); }`;

const PRELUDE = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;   // normalized 0..1, y-up, smoothed
uniform vec2 u_click;   // normalized 0..1, y-up
uniform float u_clickAge; // seconds since last click
float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453123); }
float noise(vec2 p){ vec2 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1.0,0.0)),f.x), mix(hash(i+vec2(0.0,1.0)),hash(i+vec2(1.0,1.0)),f.x), f.y); }
vec2 P(){ return (gl_FragCoord.xy - 0.5*u_res)/u_res.y; }
vec2 Mp(){ return (u_mouse-0.5)*vec2(u_res.x/u_res.y, 1.0); }
vec2 Cp(){ return (u_click-0.5)*vec2(u_res.x/u_res.y, 1.0); }
float fbm(vec2 p){ float v=0.0, a=0.5; for(int i=0;i<5;i++){ v += a*noise(p); p = p*2.02 + vec2(1.7,9.2); a *= 0.5; } return v; }
`;

// ---------- 1. Nebula — thermal-reactive gas ----------
const F_NEBULA = PRELUDE + `
vec3 thermal(float x){
  x = clamp(x, 0.0, 1.0);
  vec3 c1 = vec3(0.015,0.03,0.14);  // cold / deep blue
  vec3 c2 = vec3(0.09,0.30,0.85);   // blue
  vec3 c3 = vec3(0.46,0.22,0.80);   // violet
  vec3 c4 = vec3(0.97,0.26,0.30);   // red
  vec3 c5 = vec3(1.0,0.62,0.16);    // orange
  vec3 c6 = vec3(1.0,0.97,0.88);    // white hot
  if(x < 0.25) return mix(c1,c2, x/0.25);
  if(x < 0.45) return mix(c2,c3, (x-0.25)/0.20);
  if(x < 0.65) return mix(c3,c4, (x-0.45)/0.20);
  if(x < 0.82) return mix(c4,c5, (x-0.65)/0.17);
  return mix(c5,c6, (x-0.82)/0.18);
}
void main(){
  vec2 uv = P()*1.5;
  float t = u_time*0.06;
  // domain-warped fbm -> volumetric smoke
  vec2 q = vec2(fbm(uv + vec2(0.0,t)), fbm(uv + vec2(5.2,1.3) - t));
  vec2 r = vec2(fbm(uv + 3.4*q + vec2(1.7,9.2) + t*0.7), fbm(uv + 3.4*q + vec2(8.3,2.8) - t*0.7));
  float density = fbm(uv + 3.4*r);
  density = smoothstep(0.12, 1.05, density);
  // heat: thermal-camera reaction to cursor + clicks
  float dm = length(P() - Mp());
  float heat = 0.62*exp(-dm*dm*5.5);
  float dc = length(P() - Cp());
  heat += 1.05*exp(-dc*dc*6.0)*exp(-u_clickAge*1.05);
  float temp = density*0.42 + heat*0.95;
  vec3 col = thermal(temp) * (0.16 + density*1.18);
  float rr = dot(P(),P());
  col *= 1.0 - 0.22*rr;            // soft vignette
  gl_FragColor = vec4(col, 1.0);
}`;

// ---------- 2. Liquid metaballs ----------
const F_LIQUID = PRELUDE + `
void main(){
  vec2 p = P(); vec2 m = Mp(); float t = u_time;
  float f = 0.0;
  for(int i=0;i<6;i++){
    float fi = float(i);
    vec2 c = vec2(sin(t*0.5 + fi*1.7)*0.80, cos(t*0.42 + fi*2.3)*0.50);
    f += 0.055/length(p-c);
  }
  f += 0.085/length(p-m);
  f += (0.13*exp(-u_clickAge*1.5))/length(p-Cp());
  float iso = smoothstep(0.82, 1.02, f);
  vec3 col = mix(vec3(0.015,0.02,0.07), vec3(0.0,0.72,0.95), iso);
  float edge = exp(-abs(f-0.92)*7.0);
  col += edge*vec3(0.30,0.95,1.0);
  col += smoothstep(1.25,2.2,f)*vec3(0.9,0.25,0.7);
  gl_FragColor = vec4(col,1.0);
}`;

// ---------- 3. Antigravity — floating particle field ----------
const F_DRIFT = PRELUDE + `
void main(){
  vec2 gp = P()*5.4;
  vec2 mg = Mp()*5.4;
  vec2 cg = Cp()*5.4;
  vec2 ip = floor(gp); vec2 fp = fract(gp);
  vec3 col = vec3(0.0);
  for(int y=-1;y<=1;y++){
    for(int x=-1;x<=1;x++){
      vec2 g = vec2(float(x), float(y));
      vec2 cell = ip + g;
      vec2 base = vec2(hash(cell), hash(cell+3.1));
      float ph = hash(cell+7.0)*6.2831;
      base += 0.14*vec2(sin(u_time*0.5 + ph), cos(u_time*0.42 + ph*1.3));
      vec2 world = cell + base;
      // antigravity: particles flee the cursor
      vec2 fromM = world - mg; float md = length(fromM);
      base += normalize(fromM + 1e-4) * 0.55 * exp(-md*1.1);
      // click: scatter burst
      vec2 fromC = world - cg; float cd = length(fromC);
      base += normalize(fromC + 1e-4) * 1.1 * exp(-cd*0.85) * exp(-u_clickAge*1.3);
      vec2 pp = g + base - fp;
      float d = length(pp);
      float sz = 0.35 + 0.65*hash(cell+12.0);
      col += sz*0.0042/(d*d + 0.00028) * mix(vec3(0.34,0.52,1.0), vec3(0.70,0.84,1.0), hash(cell+5.0));
    }
  }
  col += vec3(0.012,0.018,0.05)*(0.55 + 0.45*P().y);  // faint depth haze
  col = col/(1.0+col);                                 // tone map highlights
  gl_FragColor = vec4(col,1.0);
}`;

// ---------- 4. Ripple — interactive water ----------
const F_RIPPLE = PRELUDE + `
float H(vec2 p){
  float h = 0.0;
  float dM = length(p - Mp());
  h += 0.5*sin(dM*26.0 - u_time*4.5)*exp(-dM*2.6);                 // mouse wake
  float dC = length(p - Cp());
  h += 1.0*sin(dC*30.0 - u_clickAge*9.0)*exp(-dC*1.8)*exp(-u_clickAge*1.3); // click ring
  h += 0.13*sin(p.x*9.0 + u_time*0.8)*sin(p.y*8.0 - u_time*0.6);   // ambient swell
  h += 0.07*noise(p*6.0 + u_time*0.2);
  return h;
}
void main(){
  vec2 p = P();
  float e = 0.0035;
  float hc=H(p), hx=H(p+vec2(e,0.0)), hy=H(p+vec2(0.0,e));
  vec3 n = normalize(vec3(hc-hx, hc-hy, e*9.0));
  vec3 L = normalize(vec3(0.45,0.55,0.72));
  float diff = clamp(dot(n,L),0.0,1.0);
  float spec = pow(clamp(dot(reflect(-L,n), vec3(0.0,0.0,1.0)),0.0,1.0), 30.0);
  vec3 col = mix(vec3(0.012,0.05,0.13), vec3(0.10,0.46,0.62), diff);
  col += spec*vec3(0.85,0.97,1.0);
  col += 0.10*smoothstep(0.3,0.95, hc+0.5)*vec3(0.2,0.6,0.85);     // caustic shimmer
  gl_FragColor = vec4(col,1.0);
}`;

// ---------- 5. Voronoi — glowing cells ----------
const F_VORONOI = PRELUDE + `
void main(){
  vec2 sp = P()*3.0; vec2 m = Mp()*3.0; float t = u_time*0.55;
  vec2 ip = floor(sp); vec2 fp = fract(sp);
  float d1 = 9.0, d2 = 9.0; vec2 mc = vec2(0.0);
  for(int y=-1;y<=1;y++){
    for(int x=-1;x<=1;x++){
      vec2 g = vec2(float(x), float(y));
      vec2 o = vec2(hash(ip+g), hash(ip+g+5.2));
      o = 0.5 + 0.5*sin(t + 6.2831*o);
      vec2 rr = g + o - fp;
      float d = dot(rr,rr);
      if(d < d1){ d2 = d1; d1 = d; mc = ip+g+o; }
      else if(d < d2){ d2 = d; }
    }
  }
  float edge = sqrt(d2) - sqrt(d1);
  vec3 cell = 0.5 + 0.5*cos(vec3(0.0,1.9,3.8) + (mc.x+mc.y)*1.2 + t);
  vec3 col = cell*(0.32 + 0.5*sqrt(d1));
  float border = smoothstep(0.07, 0.0, edge);
  col = mix(col, cell + 0.5, border*0.85);
  col += border*cell*0.7;
  float dm = length(P()*3.0 - m);
  col += 0.55*exp(-dm*1.4)*vec3(1.0,0.9,0.5);
  float dc = length(P() - Cp());
  col += sin(dc*22.0 - u_clickAge*8.0)*exp(-dc*3.0)*exp(-u_clickAge*1.8)*vec3(0.5,0.7,1.0);
  gl_FragColor = vec4(clamp(col,0.0,1.0),1.0);
}`;

const WALLPAPERS = [
  { name:'Nebula',      label:'Nebula',      frag:F_NEBULA,  hint:'Move your mouse to warm the gas · click to ignite it' },
  { name:'Liquid',      label:'Liquid',      frag:F_LIQUID,  hint:'Move to push the blobs around · click for a pulse' },
  { name:'Antigravity', label:'Antigravity', frag:F_DRIFT,   hint:'Move to repel the particles · click to scatter them' },
  { name:'Ripple',      label:'Ripple',      frag:F_RIPPLE,  hint:'Move to trail the water · click to drop a ripple' },
  { name:'Voronoi',     label:'Voronoi',     frag:F_VORONOI, hint:'Move to light up the cells · click for a ripple' },
];

let programs = [];
let current = 0;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:', gl.getShaderInfoLog(s), '\n', src);
    return null;
  }
  return s;
}
function makeProgram(frag){
  const vs = compile(gl.VERTEX_SHADER, VERT);
  const fs = compile(gl.FRAGMENT_SHADER, frag);
  if(!vs||!fs) return null;
  const pr = gl.createProgram();
  gl.attachShader(pr, vs); gl.attachShader(pr, fs); gl.linkProgram(pr);
  if (!gl.getProgramParameter(pr, gl.LINK_STATUS)) {
    console.error('Link error:', gl.getProgramInfoLog(pr)); return null;
  }
  return {
    pr,
    a: gl.getAttribLocation(pr, 'a'),
    u_res: gl.getUniformLocation(pr, 'u_res'),
    u_time: gl.getUniformLocation(pr, 'u_time'),
    u_mouse: gl.getUniformLocation(pr, 'u_mouse'),
    u_click: gl.getUniformLocation(pr, 'u_click'),
    u_clickAge: gl.getUniformLocation(pr, 'u_clickAge'),
  };
}

let buf;
function initGL(){
  programs = WALLPAPERS.map(w => makeProgram(w.frag));
  buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
}

let DPR = Math.min(window.devicePixelRatio || 1, 1.6);
function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  canvas.width = Math.floor(w*DPR); canvas.height = Math.floor(h*DPR);
  gl.viewport(0,0,canvas.width,canvas.height);
}

// ----- interaction state -----
const mouse = { tx:0.5, ty:0.5, x:0.5, y:0.5 };
let click = { x:0.5, y:0.5, t:-100 };
const start = performance.now();
let lastMove = start;
const ui = document.getElementById('ui');

function setMouseFromEvent(e){
  const x = e.clientX / window.innerWidth;
  const y = 1.0 - e.clientY / window.innerHeight;
  mouse.tx = x; mouse.ty = y;
  lastMove = performance.now();
  ui.classList.remove('idle');
}
window.addEventListener('pointermove', setMouseFromEvent, {passive:true});
window.addEventListener('pointerdown', e => {
  setMouseFromEvent(e);
  click.x = e.clientX / window.innerWidth;
  click.y = 1.0 - e.clientY / window.innerHeight;
  click.t = (performance.now() - start)/1000;
});

// ----- dock -----
const dock = document.getElementById('dock');
const capName = document.getElementById('capName');
const capHint = document.querySelector('.caption .hint');
WALLPAPERS.forEach((w, i) => {
  const b = document.createElement('button');
  b.textContent = w.label;
  b.onclick = () => selectWallpaper(i);
  dock.appendChild(b);
});
function selectWallpaper(i, fromURL){
  current = i;
  [...dock.children].forEach((b,bi)=> b.classList.toggle('on', bi===i));
  capName.textContent = WALLPAPERS[i].name;
  if (capHint) capHint.textContent = WALLPAPERS[i].hint;
  if (!fromURL) history.replaceState(null, '', '#' + WALLPAPERS[i].name.toLowerCase());
}
function wallpaperFromURL(){
  const h = (location.hash || '').replace('#','').toLowerCase();
  let idx = WALLPAPERS.findIndex(w => w.name.toLowerCase() === h);
  if (idx < 0) {
    const q = new URLSearchParams(location.search).get('w');
    if (q !== null && WALLPAPERS[+q]) idx = +q;
  }
  return idx >= 0 ? idx : 0;
}
window.addEventListener('hashchange', () => selectWallpaper(wallpaperFromURL(), true));
selectWallpaper(wallpaperFromURL(), true);

// keyboard: 1-5 to switch, arrows
window.addEventListener('keydown', e => {
  if (e.key>='1' && e.key<='5') selectWallpaper(+e.key-1);
  else if (e.key==='ArrowRight') selectWallpaper((current+1)%WALLPAPERS.length);
  else if (e.key==='ArrowLeft') selectWallpaper((current+WALLPAPERS.length-1)%WALLPAPERS.length);
});

// ----- render loop -----
function frame(){
  const now = performance.now();
  const time = (now - start)/1000;
  // smooth mouse for the "fidget" feel
  mouse.x += (mouse.tx - mouse.x)*0.08;
  mouse.y += (mouse.ty - mouse.y)*0.08;
  if (now - lastMove > 2600) ui.classList.add('idle');

  const P = programs[current];
  if (P) {
    gl.useProgram(P.pr);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(P.a);
    gl.vertexAttribPointer(P.a, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(P.u_res, canvas.width, canvas.height);
    gl.uniform1f(P.u_time, time);
    gl.uniform2f(P.u_mouse, mouse.x, mouse.y);
    gl.uniform2f(P.u_click, click.x, click.y);
    gl.uniform1f(P.u_clickAge, time - click.t);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }
  requestAnimationFrame(frame);
}

if (gl){
  initGL();
  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(frame);
}
</script>
</body>
</html>
